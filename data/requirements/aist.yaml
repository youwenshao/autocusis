# AutoCUSIS graduation-requirement definition for AIST.
#
# Encodes the CUHK B.Sc. in Artificial Intelligence: Systems and Technologies
# study scheme. The DSL is flat, so the official hierarchy is flattened into one
# group per leaf requirement.
#
# Group rule kinds:
#   all_of       - every course listed must be completed (core/required)
#   credits_from - complete at least `min_credits` credits from `courses`
#   count_from   - complete at least `min_count` courses from `courses`
#   one_of       - complete every course in exactly one `tracks` entry
#
# Completed SHHO / university requirements use the actual course codes from
# the student's transcript (ELTU2014, GESH1010, UGCP1001/1002, PHED1017).

program: AIST
cohort: "2024"
description: "B.Sc. in Artificial Intelligence: Systems and Technologies"
total_credits_required: 106

groups:
  # -- University language requirements -----------------------------------
  - id: chinese_language
    name: Chinese Language
    kind: all_of
    note: "CHLT1104 (0 credits)."
    courses:
      - CHLT1104

  - id: english_y2
    name: English Language Year 2
    kind: all_of
    note: "ELTU2014 English for ERG Stds I (3 credits)."
    courses:
      - ELTU2014

  - id: english_y3
    name: English Language Year 3
    kind: credits_from
    min_credits: 2
    max_credits: 2
    max_pool_count: 1
    note: "Choose one 2-credit ELTU Year 3 course."
    courses:
      - ELTU3014
      - ELTU3024
      - ELTU3414
      - ELTU3415
      - ELTU3502
      - ELTU3503

  # -- CUHK General Education ----------------------------------------------
  - id: ge_foundation
    name: GE Foundation Programme
    kind: all_of
    note: "In Dialogue with Nature (UGFN1000) and In Dialogue with Humanity (UGFH1000)."
    courses:
      - UGFN1000
      - UGFH1000

  - id: ge_area_a
    name: GE Area A - Chinese Cultural Heritage
    kind: credits_from
    min_credits: 2
    note: >-
      2 units required. English-offered only (2025-26 T1 class attributes).
      Pool below is filtered to courses with an English/Putonghua-and-English
      section; see data/ugea_language.json for per-section MOI. Best 2cr picks:
      UGEA1881, UGEA2145. UGEA1310/2288 need the English-labelled section.
    courses:
      - UGEA1310
      - UGEA1545
      - UGEA1881
      - UGEA2145
      - UGEA2180
      - UGEA2283
      - UGEA2288
      - UGEA2330
      - UGEA2332
      - UGEA2334
      - UGEA2451

  # -- SHHO College General Education --------------------------------------
  - id: shho_required_1
    name: SHHO Required Courses I
    kind: all_of
    note: "GESH1010 Orientation and Outreach (3 credits). GESH1000 symposium is 0 credits."
    courses:
      - GESH1010

  - id: shho_required_2
    name: SHHO Required Courses II
    kind: all_of
    note: "Both needed: GESH2011 (1cr) and GESH2012 (2cr)."
    courses:
      - GESH2011
      - GESH2012

  - id: understanding_china
    name: Understanding China
    kind: all_of
    note: "UGCP1001 (1 credit)."
    courses:
      - UGCP1001

  - id: hk_constitutional
    name: HK in the Wider Constitutional Order
    kind: all_of
    note: "UGCP1002 (1 credit)."
    courses:
      - UGCP1002

  - id: physical_education
    name: Physical Education
    kind: all_of
    note: "PHED1017 Physical Conditioning (1 credit)."
    courses:
      - PHED1017

  # -- AIST Major ----------------------------------------------------------
  - id: aist_faculty_package
    name: Faculty Package
    kind: all_of
    note: "ESTR1002/ESTR1005/ESTR1006 are accepted equivalents."
