# -- Elective specialization streams ---------------------------------------
# Soft preference used by the scheduler to cluster electives toward a chosen
# specialization (set via profile.elective_stream or `autocusis plan --stream`).
# Each course in the major_electives pool is curated into exactly one stream;
# ESTR equivalents follow their CSCI/AIST/MAEG/etc. counterpart. A few generic
# courses (ENGG1820 internship, ENGG2720/ESTR2014 complex variables) are left
# unmapped on purpose: they belong to no specialization and act as neutral
# fallbacks. The bias is soft - the solver still falls back to out-of-stream
# courses to satisfy credit/prerequisite/availability constraints.
